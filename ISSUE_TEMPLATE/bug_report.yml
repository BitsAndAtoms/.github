name: Bug Report
description: Something is broken, producing wrong output, or crashing.
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-sentence description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. 
        2. 
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What should happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: What actually happens. Include any error message or traceback.
    validations:
      required: true

  - type: checkboxes
    id: affected
    attributes:
      label: Affected Module
      options:
        - label: main.py / CalendarStreamliner
        - label: event_analysis.py / EventAnalyzer
        - label: ui.py / CalendarUI
        - label: llm_client.py / LLMClient
        - label: calendar_api.py / CalendarAPI
        - label: scripts/linux_mint_appctl.sh
        - label: integration_tests/

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - Provider (openai / anthropic / ollama):
        - Python version:
        - OS:
        - Any relevant APP_CONFIG keys:
    validations:
      required: false
