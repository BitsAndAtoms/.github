name: Feature Request
description: Propose a new feature, improvement, or change.
body:
  - type: textarea
    id: motivation
    attributes:
      label: Problem / Motivation
      description: What gap or friction does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: What the feature should do and which file(s) or component(s) it touches.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - [ ] 
        - [ ] 
    validations:
      required: false
